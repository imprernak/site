<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunflower Garden</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sun: #f9c22e;
      --petal: #f4a01c;
      --center: #4a2c0a;
      --stem: #4a7c3f;
      --leaf: #3a6b30;
      --sky: #87ceeb;
      --ground: #6b8e4e;
      --soil: #8b6040;
      --bg: #e8f4f8;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: linear-gradient(180deg, #c9e8f7 0%, #87ceeb 40%, #b8dba0 40%, #6b8e4e 100%);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: crosshair;
    }

    /* Sun in corner */
    .sun {
      position: fixed;
      top: -40px;
      right: -40px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, #fff9a0 0%, #f9c22e 50%, #f4a01c 100%);
      border-radius: 50%;
      box-shadow: 0 0 60px 20px rgba(249,194,46,0.4);
      animation: sunPulse 4s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes sunPulse {
      0%, 100% { box-shadow: 0 0 60px 20px rgba(249,194,46,0.4); }
      50% { box-shadow: 0 0 90px 40px rgba(249,194,46,0.6); }
    }

    /* Clouds */
    .cloud {
      position: fixed;
      top: 10%;
      background: white;
      border-radius: 50px;
      opacity: 0.85;
      animation: drift linear infinite;
      z-index: 0;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud:nth-child(1) { width: 100px; height: 35px; top: 8%; left: -120px; animation-duration: 28s; animation-delay: 0s; }
    .cloud:nth-child(1)::before { width: 50px; height: 50px; top: -25px; left: 15px; }
    .cloud:nth-child(1)::after { width: 35px; height: 35px; top: -15px; left: 45px; }
    .cloud:nth-child(2) { width: 130px; height: 40px; top: 18%; left: -150px; animation-duration: 35s; animation-delay: -12s; }
    .cloud:nth-child(2)::before { width: 60px; height: 60px; top: -30px; left: 20px; }
    .cloud:nth-child(2)::after { width: 45px; height: 45px; top: -20px; left: 60px; }
    .cloud:nth-child(3) { width: 80px; height: 30px; top: 5%; left: -100px; animation-duration: 22s; animation-delay: -7s; }
    .cloud:nth-child(3)::before { width: 40px; height: 40px; top: -20px; left: 12px; }
    .cloud:nth-child(3)::after { width: 30px; height: 30px; top: -12px; left: 38px; }
    @keyframes drift {
      from { transform: translateX(0); }
      to { transform: translateX(calc(100vw + 200px)); }
    }

    /* Ground strip */
    .ground {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 38vh;
      background: linear-gradient(180deg, #6b8e4e 0%, #5a7a3e 30%, #8b6040 60%, #7a5535 100%);
      z-index: 1;
    }
    .ground::before {
      content: '';
      position: absolute;
      top: -8px; left: 0; right: 0; height: 16px;
      background: repeating-linear-gradient(90deg, #5a7a3e 0%, #6b8e4e 10%, #5a7a3e 20%);
      border-radius: 50% 50% 0 0 / 8px 8px 0 0;
    }

    /* Center UI */
    .hero {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 8vh;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: #2d5016;
      text-shadow: 0 2px 8px rgba(255,255,255,0.6), 0 4px 20px rgba(255,255,255,0.4);
      margin-bottom: 0.3em;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: #3a6b30;
      margin-bottom: 2rem;
      opacity: 0.85;
    }

    .btn {
      position: relative;
      padding: 18px 52px;
      font-family: 'Lato', sans-serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #2d1a00;
      background: linear-gradient(135deg, #f9c22e, #f4a01c);
      border: none;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(244,160,28,0.5), inset 0 1px 0 rgba(255,255,255,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent 60%);
      border-radius: inherit;
    }
    .btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 10px 32px rgba(244,160,28,0.6), inset 0 1px 0 rgba(255,255,255,0.4); }
    .btn:active { transform: translateY(1px) scale(0.98); }
    .btn.bloomed { animation: btnBounce 0.4s ease; }
    @keyframes btnBounce {
      0% { transform: scale(1); }
      30% { transform: scale(0.92); }
      70% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: rgba(45, 80, 22, 0.6);
      letter-spacing: 1px;
    }

    /* Sunflower SVG container */
    .garden {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 100vh;
      pointer-events: none;
      z-index: 2;
    }

    .sunflower {
      position: absolute;
      bottom: 30vh;
      transform-origin: bottom center;
      animation: growUp 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
      opacity: 0;
    }

    @keyframes growUp {
      0%   { transform: scaleY(0) translateX(-50%); opacity: 0; }
      60%  { opacity: 1; }
      80%  { transform: scaleY(1.08) translateX(-50%); }
      100% { transform: scaleY(1) translateX(-50%); opacity: 1; }
    }

    .sunflower svg {
      display: block;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.18));
    }

    /* Petal spin on appear */
    .petal-group {
      transform-origin: 60px 60px;
      animation: spinIn 0.6s ease-out forwards;
    }
    @keyframes spinIn {
      from { transform: rotate(-30deg) scale(0.5); opacity: 0; }
      to   { transform: rotate(0deg) scale(1); opacity: 1; }
    }

    /* Sway after grow */
    .sunflower.sway svg {
      animation: sway 3s ease-in-out infinite;
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-2deg); }
      50%       { transform: rotate(2deg); }
    }

    /* Particle burst */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 20;
      border-radius: 50%;
      animation: burst 0.8s ease-out forwards;
    }
    @keyframes burst {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* Counter badge */
    .counter {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.85);
      border: 1.5px solid rgba(249,194,46,0.6);
      border-radius: 40px;
      padding: 6px 20px;
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: #2d5016;
      z-index: 30;
      opacity: 0;
      transition: opacity 0.4s;
      backdrop-filter: blur(6px);
    }
    .counter.visible { opacity: 1; }
  </style>
</head>
<body>

  <!-- Sky decorations -->
  <div class="sun"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>

  <!-- Ground -->
  <div class="ground"></div>

  <!-- Garden layer -->
  <div class="garden" id="garden"></div>

  <!-- Flower counter -->
  <div class="counter" id="counter">🌻 1 sunflower</div>

  <!-- Main UI -->
  <div class="hero">
    <p class="title">Sunflower Garden</p>
    <p class="subtitle">Every tap blooms a new flower</p>
    <button class="btn" id="bloomBtn" onclick="bloom()">🌻 Tap to Bloom</button>
    <p class="hint">Click anywhere on the ground too!</p>
  </div>

  <script>
    let count = 0;
    const garden = document.getElementById('garden');
    const counter = document.getElementById('counter');
    const btn = document.getElementById('bloomBtn');

    // Sizes for variety
    const sizes = [70, 85, 100, 115, 130];
    const swayDelays = ['0s','0.4s','0.8s','1.2s','1.6s'];

    function makeSunflowerSVG(size) {
      const s = size;
      const cx = s / 2, cy = s / 2, r = s * 0.22;
      // Generate 12 petals
      let petals = '';
      for (let i = 0; i < 12; i++) {
        const angle = (i * 30) * Math.PI / 180;
        const px = cx + Math.cos(angle) * r * 1.7;
        const py = cy + Math.sin(angle) * r * 1.7;
        const rot = i * 30;
        petals += `<ellipse cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" rx="${(r*0.55).toFixed(1)}" ry="${(r*0.28).toFixed(1)}" fill="#f9c22e" stroke="#e8950a" stroke-width="0.5" transform="rotate(${rot} ${px.toFixed(1)} ${py.toFixed(1)})"/>`;
      }
      // Inner ring petals (offset 15deg)
      let innerPetals = '';
      for (let i = 0; i < 12; i++) {
        const angle = ((i * 30) + 15) * Math.PI / 180;
        const px = cx + Math.cos(angle) * r * 1.35;
        const py = cy + Math.sin(angle) * r * 1.35;
        const rot = i * 30 + 15;
        innerPetals += `<ellipse cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" rx="${(r*0.42).toFixed(1)}" ry="${(r*0.22).toFixed(1)}" fill="#f4a01c" stroke="#d4880a" stroke-width="0.3" transform="rotate(${rot} ${px.toFixed(1)} ${py.toFixed(1)})"/>`;
      }

      const stemH = s * 1.4;
      const stemW = s * 0.07;
      const leafW = s * 0.28, leafH = s * 0.16;

      return `
      <svg width="${s}" height="${s + stemH}" viewBox="0 0 ${s} ${s + stemH}" xmlns="http://www.w3.org/2000/svg">
        <!-- Stem -->
        <rect x="${cx - stemW/2}" y="${cy}" width="${stemW}" height="${stemH}" rx="${stemW/2}" fill="#4a7c3f"/>
        <!-- Left leaf -->
        <ellipse cx="${cx - s*0.18}" cy="${cy + stemH*0.45}" rx="${leafW}" ry="${leafH}" fill="#3a6b30" transform="rotate(-30 ${cx - s*0.18} ${cy + stemH*0.45})"/>
        <!-- Right leaf -->
        <ellipse cx="${cx + s*0.18}" cy="${cy + stemH*0.62}" rx="${leafW}" ry="${leafH}" fill="#4a7c3f" transform="rotate(30 ${cx + s*0.18} ${cy + stemH*0.62})"/>
        <!-- Petals group -->
        <g class="petal-group">
          ${petals}
          ${innerPetals}
          <!-- Center disc -->
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="#3a1f06"/>
          <!-- Center texture dots -->
          ${Array.from({length:18}, (_,i) => {
            const a = (i*20)*Math.PI/180, dr = r*0.55;
            return `<circle cx="${(cx+Math.cos(a)*dr).toFixed(1)}" cy="${(cy+Math.sin(a)*dr).toFixed(1)}" r="${(r*0.1).toFixed(1)}" fill="#5a2e0a" opacity="0.7"/>`;
          }).join('')}
          ${Array.from({length:8}, (_,i) => {
            const a = (i*45)*Math.PI/180, dr = r*0.25;
            return `<circle cx="${(cx+Math.cos(a)*dr).toFixed(1)}" cy="${(cy+Math.sin(a)*dr).toFixed(1)}" r="${(r*0.12).toFixed(1)}" fill="#5a2e0a" opacity="0.5"/>`;
          }).join('')}
          <circle cx="${cx}" cy="${cy}" r="${(r*0.18).toFixed(1)}" fill="#4a2c0a"/>
        </g>
      </svg>`;
    }

    function spawnParticles(x, y) {
      const colors = ['#f9c22e','#f4a01c','#3a6b30','#fff176','#ffb300'];
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 6 + Math.random() * 8;
        const angle = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 100;
        p.style.cssText = `
          left:${x}px; top:${y}px;
          width:${size}px; height:${size}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          --dx:${(Math.cos(angle)*dist).toFixed(0)}px;
          --dy:${(Math.sin(angle)*dist).toFixed(0)}px;
          animation-delay:${(Math.random()*0.1).toFixed(2)}s;
        `;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 900);
      }
    }

    function placeFlower(xPercent) {
      count++;
      const size = sizes[Math.floor(Math.random() * sizes.length)];
      // Slight random horizontal jitter around click position
      const jitter = (Math.random() - 0.5) * 6;
      const left = Math.max(2, Math.min(96, xPercent + jitter));

      const wrapper = document.createElement('div');
      wrapper.className = 'sunflower';
      wrapper.style.cssText = `
        left: ${left}%;
        transform: translateX(-50%) scaleY(0);
        animation-delay: ${(Math.random()*0.15).toFixed(2)}s;
      `;
      wrapper.innerHTML = makeSunflowerSVG(size);
      garden.appendChild(wrapper);

      // Add sway after grow animation ends
      setTimeout(() => {
        wrapper.classList.add('sway');
        const svgEl = wrapper.querySelector('svg');
        if (svgEl) {
          svgEl.style.animationDelay = swayDelays[Math.floor(Math.random() * swayDelays.length)];
        }
      }, 900);

      // Update counter
      counter.classList.add('visible');
      counter.textContent = `🌻 ${count} sunflower${count !== 1 ? 's' : ''}`;
    }

    function bloom(e) {
      // Bloom from center or event position
      const rect = btn.getBoundingClientRect();
      const bx = rect.left + rect.width / 2;
      const by = rect.top + rect.height / 2;
      spawnParticles(bx, by);

      // Place 3 flowers spread across garden on button click
      const spread = [35 + Math.random()*10, 48 + Math.random()*8, 60 + Math.random()*10];
      spread.forEach((x, i) => setTimeout(() => placeFlower(x), i * 120));

      btn.classList.add('bloomed');
      setTimeout(() => btn.classList.remove('bloomed'), 400);
    }

    // Click on ground = plant a flower at that spot
    document.addEventListener('click', (e) => {
      if (e.target === btn || btn.contains(e.target)) return;
      const windowH = window.innerHeight;
      // Only react to clicks on lower 45% of screen (ground area)
      if (e.clientY > windowH * 0.55) {
        const xPercent = (e.clientX / window.innerWidth) * 100;
        spawnParticles(e.clientX, e.clientY);
        placeFlower(xPercent);
      }
    });
  </script>
</body>
</html>
